<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام MSP الذكي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background: #f8f9fa; /* خلفية فاتحة مريحة */
        }

        .login-container {
            width: 100%; max-width: 400px; padding: 20px;
        }

        .login-card {
            background: #ffffff; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border-top: 5px solid var(--msp-green); text-align: center;
        }

        .login-logo { width: 100px; margin-bottom: 20px; border-radius: 10px; }

        .form-group { text-align: right; margin-bottom: 20px; position: relative; }
        
        .form-group label { 
            display: block; margin-bottom: 8px; font-weight: bold; 
            color: var(--msp-bronze); font-size: 0.9rem;
        }

        .login-input {
            width: 100%; padding: 12px 15px; border: 1px solid #e1e1e1;
            border-radius: 10px; box-sizing: border-box; font-family: inherit;
            transition: 0.3s; background: #fafafa;
        }

        .login-input:focus {
            border-color: var(--msp-green); background: #fff;
            box-shadow: 0 0 0 4px rgba(47, 180, 90, 0.1); outline: none;
        }

        .login-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: var(--msp-green); color: white; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(47, 180, 90, 0.2);
        }

        .login-btn:hover { background: #269a4d; transform: translateY(-2px); }
        .login-btn:disabled { background: #ccc; cursor: not-allowed; }

        .footer-text { margin-top: 25px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <img src="MSP_Logo.jpeg" alt="MSP Logo" class="login-logo">
            <h2 style="margin:0; color:var(--text-main);">مرحباً بك</h2>
            <p style="color:#666; font-size:0.9rem; margin-bottom:30px;">نظام إدارة المبيعات والزيارات الميدانية</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" class="login-input" placeholder="أدخل اسم المستخدم" required>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="login-input" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submitBtn" class="login-btn">دخول للنظام 🚀</button>
            </form>

            <div class="footer-text">
                © 2026 Modern Style Pack (MSP) <br> جميع الحقوق محفوظة
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
