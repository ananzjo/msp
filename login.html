<link rel="stylesheet" href="login.css">
<div class="login-box">
    <img src="MSP_Logo.jpeg" width="100">
    <h2>دخول نظام الطراز MSP</h2>
    <form id="loginForm">
        <input type="text" id="f01_username" placeholder="اسم المستخدم" required>
        <div style="position:relative;">
            <input type="password" id="f02_password" placeholder="كلمة المرور" required>
            <span id="eyeIcon" style="position:absolute;left:10px;top:10px;cursor:pointer;">👁️</span>
        </div>
        <button type="submit">دخول آمن 🚀</button>
    </form>
</div>
<script src="global-config.js"></script>
<script src="login.js"></script>
