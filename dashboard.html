<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | MSP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <div>
                <h2 style="margin:0; color:var(--msp-bronze);">نظام MSP لإدارة المبيعات</h2>
                <small style="color:#888;">Modern Style Pack Sales System</small>
            </div>
            <div id="digitalClock">00:00:00</div>
        </header>

        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:25px;">
            <div class="msp-card" style="text-align:center;">
                <h4 style="color:#aaa;">إجمالي الزيارات | Total Visits</h4>
                <h1 id="totalVisits" style="color:var(--msp-green); font-size:3rem; margin:10px 0;">0</h1>
            </div>
            <div class="msp-card" style="text-align:center;">
                <h4 style="color:#aaa;">فرص فورية | Hot Leads</h4>
                <h1 id="hotLeads" style="color:#ff4757; font-size:3rem; margin:10px 0;">0</h1>
            </div>
            <div class="msp-card" style="text-align:center;">
                <h4 style="color:#aaa;">الكمية المتوقعة | Est. Qty</h4>
                <h1 id="totalQty" style="color:var(--msp-bronze); font-size:3rem; margin:10px 0;">0</h1>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: visits } = await supabaseClient.from('t01_visits').select('*');
            if (visits) {
                document.getElementById('totalVisits').textContent = visits.length;
                document.getElementById('hotLeads').textContent = visits.filter(v => v.f14_sales_opportunity === 'فورية').length;
                const totalQty = visits.reduce((sum, v) => sum + (parseFloat(v.f12_monthly_qty) || 0), 0);
                document.getElementById('totalQty').textContent = totalQty.toLocaleString();
            }
        });
    </script>
</body>
</html>
