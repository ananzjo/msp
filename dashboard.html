<div class="main-wrapper">
    <h1>📊 لوحة تحكم MSP</h1>
    <div class="stats-grid">
        <div class="stat-card"><h3>إجمالي الزيارات</h3><h2 id="totalVisits">0</h2></div>
        <div class="stat-card"><h3>كميات الشهر</h3><h2 id="totalQty">0</h2></div>
    </div>
</div>
<script src="global-config.js"></script>
<script>
    async function loadStats() {
        const { data } = await supabaseClient.from('t01_visits').select('f12_monthly_qty');
        if(data) {
            document.getElementById('totalVisits').innerText = data.length;
            const total = data.reduce((sum, item) => sum + (item.f12_monthly_qty || 0), 0);
            document.getElementById('totalQty').innerText = total.toLocaleString() + " لتر";
        }
    }
    loadStats();
</script>
