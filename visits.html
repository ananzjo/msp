<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة زيارة | MSP System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global-config.js"></script>
    
    <link rel="stylesheet" href="visits.css">
</head>
<body>

    <main class="main-content">
        <div class="page-header">
            <h2 class="page-title">📝 تسجيل زيارة ميدانية</h2>
            <p class="page-subtitle">نظام MSP لإدارة المبيعات والتغليف</p>
        </div>

        <div class="msp-card">
            <form id="visitForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>المحافظة</label>
                        <select id="f_gov_id" class="msp-input" required>
                            <option value="">جاري التحميل...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المنطقة / القطاع</label>
                        <select id="f_area_id" class="msp-input" required>
                            <option value="">اختر المحافظة أولاً...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>اسم العميل</label>
                        <input type="text" id="f_client_name" class="msp-input" placeholder="اسم المحل أو العميل" required>
                    </div>

                    <div class="form-group">
                        <label>حالة الزيارة</label>
                        <select id="f_visit_status" class="msp-input" required>
                            <option value="تم البيع">✅ تم البيع</option>
                            <option value="متابعة">⏳ متابعة</option>
                            <option value="رفض">❌ رفض</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>الملاحظات</label>
                        <textarea id="f_notes" class="msp-input" rows="3"></textarea>
                    </div>
                </div>

                <div style="margin-top: 25px; display: flex; gap: 10px;">
                    <button type="submit" class="btn-primary">حفظ البيانات 🚀</button>
                    <button type="reset" class="btn-secondary">إلغاء</button>
                </div>
            </form>
        </div>
    </main>

    <script src="visits.js"></script>
</body>
</html>
