<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP - توثيق الزيارات الميدانية</title>
    <link rel="stylesheet" href="visits.css">
    </head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="MSP_Logo.jpeg" alt="MSP Logo" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">تسجيل زيارة</a></li>
            </ul>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
            <h2 class="page-title">توثيق الزيارات الميدانية</h2>
            
            <div class="connection-status">
                <span id="digital-clock" class="taxi-clock">00:00:00</span>
                <div class="pulse-indicator" title="Live Connection"></div>
            </div>
        </header>

        <section class="container">
            <form id="visitForm" class="modern-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>المحافظة</label>
                        <select id="f_governorate" required>
                            <option value="">اختر المحافظة...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>المنطقة</label>
                        <select id="f_area" required>
                            <option value="">اختر المنطقة...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>اسم المنشأة</label>
                        <input type="text" id="f_facility_name" required placeholder="اسم الشركة / المصنع">
                    </div>

                    <div class="form-group">
                        <label>نوع المنشأة</label>
                        <select id="f_facility_type"></select>
                    </div>

                    <div class="form-group">
                        <label>القطاع الصناعي</label>
                        <select id="f_industrial_sector"></select>
                    </div>

                    <div class="form-group full-width">
                        <label>العنوان</label>
                        <input type="text" id="f_address" placeholder="تفاصيل العنوان">
                    </div>

                    <div class="form-group">
                        <label>اسم الشخص المسؤول</label>
                        <input type="text" id="f_contact_person">
                    </div>

                    <div class="form-group">
                        <label>المسمى الوظيفي</label>
                        <input type="text" id="f_job_title">
                    </div>

                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="f_phone">
                    </div>

                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="f_email">
                    </div>

                    <div class="form-group">
                        <label>هل يستخدم كرتون معرّج؟</label>
                        <select id="f_uses_carton"></select>
                    </div>

                    <div class="form-group">
                        <label>الكمية الشهرية التقريبية</label>
                        <input type="number" id="f_monthly_qty">
                    </div>

                    <div class="form-group">
                        <label>درجة الاهتمام</label>
                        <select id="f_interest_level"></select>
                    </div>

                    <div class="form-group">
                        <label>فرصة بيع</label>
                        <select id="f_sales_opportunity"></select>
                    </div>

                    <div class="form-group full-width">
                        <label>ملاحظات المندوب</label>
                        <textarea id="f_notes" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>اسم مندوب المبيعات</label>
                        <select id="f_sales_rep"></select>
                    </div>

                    <div class="form-group">
                        <label>تاريخ الزيارة</label>
                        <input type="date" id="f_visit_date" required>
                    </div>

                    <div class="form-group">
                        <label>زيارة متابعة؟</label>
                        <select id="f_follow_up"></select>
                    </div>

                    <div class="form-group">
                        <label>التقييم (1-10)</label>
                        <input type="range" id="f_rating" min="1" max="10" value="5">
                        <span id="rating-val">5</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="saveBtn" class="btn-primary">حفظ الزيارة</button>
                    <button type="reset" class="btn-secondary">مسح الحقول</button>
                </div>
            </form>

            <hr class="section-divider">

            <div class="table-controls">
                <input type="text" id="globalFilter" placeholder="بحث في جميع الحقول...">
            </div>

            <div class="table-wrapper">
                <table id="visitsTable">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>المنشأة</th>
                            <th>المحافظة</th>
                            <th>المندوب</th>
                            <th>فرصة بيع</th>
                            <th>التقييم</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="global-config.js"></script>
    <script src="visits.js"></script>
</body>
</html>
