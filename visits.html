<div class="main-wrapper">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px;">
        <div>
            <h2 style="margin:0; color:var(--msp-green);">توثيق زيارة ميدانية | Sales Visit</h2>
            <small style="color:#aaa;">Modern Style Pack - MSP</small>
        </div>
        <div id="digitalClock">00:00:00</div>
    </header>

    <div class="msp-card">
        <form id="visitForm">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div><label>المحافظة | Governorate (f01)</label><select id="f01_governorate" required></select></div>
                <div><label>المنطقة | Area (f02)</label><select id="f02_area" required></select></div>
                <div><label>اسم المنشأة | Facility Name (f03)</label><input type="text" id="f03_facility_name" required></div>
                
                <div><label>نوع المنشأة | Type (f04)</label><input type="text" id="f04_facility_type"></div>
                <div><label>القطاع | Sector (f05)</label><input type="text" id="f05_industrial_sector"></div>
                <div><label>العنوان | Address (f06)</label><input type="text" id="f06_address"></div>

                <div><label>المسؤول | Contact (f07)</label><input type="text" id="f07_contact_person"></div>
                <div><label>المسمى | Job Title (f08)</label><input type="text" id="f08_job_title"></div>
                <div><label>الهاتف | Phone (f09)</label><input type="tel" id="f09_phone"></div>

                <div><label>البريد | Email (f10)</label><input type="email" id="f10_email"></div>
                <div><label>كرتون؟ | Uses Carton (f11)</label><select id="f11_uses_carton"><option value="نعم">نعم | Yes</option><option value="لا">لا | No</option></select></div>
                <div><label>الكمية | Est. Qty (f12)</label><input type="number" id="f12_monthly_qty"></div>

                <div><label>الاهتمام | Interest (f13)</label><input type="text" id="f13_interest_level"></div>
                <div><label>الفرصة | Opportunity (f14)</label><select id="f14_sales_opportunity"><option value="عادية">عادية | Regular</option><option value="فورية">فورية | Hot</option></select></div>
                <div><label>التاريخ | Date (f17)</label><input type="date" id="f17_visit_date" required></div>

                <div><label>متابعة؟ | Follow-up (f18)</label><select id="f18_follow_up"><option value="لا">لا | No</option><option value="نعم">نعم | Yes</option></select></div>
                <div><label>التقييم | Rating (f19)</label><input type="number" id="f19_rating" min="1" max="10"></div>
                <div style="grid-column: span 3;"><label>ملاحظات إضافية | Notes (f15)</label><textarea id="f15_notes" rows="2"></textarea></div>
            </div>
            <div style="margin-top:25px; text-align:left;">
                <button type="submit" class="btn-luxury">حفظ البيانات | Save 💾</button>
            </div>
        </form>
    </div>
</div>
